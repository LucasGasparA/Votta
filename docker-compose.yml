version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: legisla-db
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: legisla
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: legisla-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://usuario:senha@db:5432/legisla
      - PORT=4000
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legisla-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
