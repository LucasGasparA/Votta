services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: votta
      POSTGRES_PASSWORD: votta
      POSTGRES_DB: votta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U votta"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Back
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./Back:/app
      - backend_modules:/app/node_modules
    environment:
      DATABASE_URL: postgresql://votta:votta@postgres:5432/votta
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      PORT: "4000"
      PYTHON_BIN: /opt/rag-venv/bin/python3
      CHROMA_DIR: /app/chroma_db
    env_file:
      - path: ./Back/.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Front
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./Front:/app
      - frontend_modules:/app/node_modules

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
